<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת וובהוק - Kinyan CRM</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 520px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            border: 1px solid #334155;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 6px;
            color: #38bdf8;
        }
        .subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 24px;
        }
        .endpoint-badge {
            display: inline-block;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 6px;
            padding: 6px 12px;
            font-family: monospace;
            font-size: 12px;
            color: #38bdf8;
            margin-bottom: 20px;
            direction: ltr;
            text-align: left;
            width: 100%;
        }
        .endpoint-badge .method { color: #22c55e; font-weight: bold; }
        label {
            display: block;
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 6px;
            font-weight: 500;
        }
        label .optional {
            font-size: 11px;
            color: #64748b;
            font-weight: normal;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 15px;
            font-family: inherit;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        textarea { resize: vertical; min-height: 60px; }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }
        input::placeholder, textarea::placeholder { color: #64748b; }
        .row {
            display: flex;
            gap: 12px;
        }
        .row > div { flex: 1; }
        .btn-group {
            margin-bottom: 20px;
        }
        .btn-group label {
            margin-bottom: 8px;
        }
        .btn-group-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn-group-options button {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #94a3b8;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-group-options button:hover {
            border-color: #38bdf8;
            color: #38bdf8;
        }
        .btn-group-options button.active {
            background: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
            font-weight: 600;
        }
        .btn-group-options button.active-ivr {
            background: #a78bfa;
            color: #0f172a;
            border-color: #a78bfa;
            font-weight: 600;
        }
        .section-divider {
            border: none;
            border-top: 1px solid #334155;
            margin: 20px 0;
        }
        .section-title {
            font-size: 13px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        .btn-send {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: #0f172a;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        .btn-send:hover { opacity: 0.9; }
        .btn-send:active { transform: scale(0.98); }
        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-send.ivr-mode {
            background: linear-gradient(135deg, #a78bfa, #818cf8);
        }
        .result {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            direction: ltr;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
            display: none;
            font-family: monospace;
            max-height: 200px;
            overflow-y: auto;
        }
        .result.success {
            background: #052e16;
            border: 1px solid #22c55e;
            color: #86efac;
            display: block;
        }
        .result.error {
            background: #450a0a;
            border: 1px solid #ef4444;
            color: #fca5a5;
            display: block;
        }
        .payload-preview {
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            background: #0f172a;
            border: 1px solid #334155;
            font-family: monospace;
            font-size: 11px;
            direction: ltr;
            text-align: left;
            white-space: pre-wrap;
            color: #94a3b8;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }
        .payload-toggle {
            font-size: 12px;
            color: #64748b;
            cursor: pointer;
            margin-top: 8px;
            text-decoration: underline;
        }
        .payload-toggle:hover { color: #94a3b8; }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #0f172a;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-left: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #elementorFields, #ivrFields { transition: all 0.3s; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔗 בדיקת וובהוק</h1>
        <p class="subtitle">שליחת וובהוק לבדיקה למערכת Kinyan CRM</p>

        <!-- Webhook Type -->
        <div class="btn-group">
            <label>סוג וובהוק</label>
            <div class="btn-group-options">
                <button type="button" class="active" onclick="setWebhookType(this, 'elementor')">Elementor (טופס אתר)</button>
                <button type="button" onclick="setWebhookType(this, 'ivr')">IVR (ימות המשיח)</button>
            </div>
        </div>

        <!-- Target -->
        <div class="btn-group">
            <label>יעד</label>
            <div class="btn-group-options">
                <button type="button" class="active" onclick="setTarget(this, 'local')">מקומי (8000)</button>
                <button type="button" onclick="setTarget(this, 'render')">Render (Production)</button>
            </div>
        </div>

        <div class="endpoint-badge">
            <span class="method">POST</span> <span id="endpointUrl">http://localhost:8000/webhooks/lead</span>
        </div>

        <form id="webhookForm" onsubmit="sendWebhook(event)">

            <!-- ===== Elementor Fields ===== -->
            <div id="elementorFields">
                <div class="section-title">פרטי טופס Elementor</div>

                <label>שם מלא *</label>
                <input type="text" id="fullName" placeholder="הדסה קליין">

                <div class="row">
                    <div>
                        <label>טלפון *</label>
                        <input type="tel" id="phone" placeholder="0527180979" dir="ltr">
                    </div>
                    <div>
                        <label>אימייל <span class="optional">(לא חובה)</span></label>
                        <input type="email" id="email" placeholder="user@email.com" dir="ltr">
                    </div>
                </div>

                <label>מסלול</label>
                <select id="course">
                    <option value="כח הטענה">כח הטענה</option>
                    <option value="שבת">שבת</option>
                    <option value="איסור והיתר">איסור והיתר</option>
                    <option value="טהרה">טהרה</option>
                    <option value="חושן משפט">חושן משפט</option>
                </select>

                <label>תוכן הודעה <span class="optional">(לא חובה)</span></label>
                <textarea id="message" placeholder="הודעה חופשית..."></textarea>
            </div>

            <!-- ===== IVR Fields ===== -->
            <div id="ivrFields" style="display:none">
                <div class="section-title">פרטי שיחת IVR (ימות המשיח)</div>

                <label>טלפון מתקשר *</label>
                <input type="tel" id="ivrPhone" placeholder="0527180504" dir="ltr">

                <label>שלוחה / מוצר</label>
                <select id="ivrFolder">
                    <option value="1/2/1">1/2/1 - שבת (שלוחה 1)</option>
                    <option value="1/2/2">1/2/2 - איסור והיתר (שלוחה 2)</option>
                    <option value="1/2/3">1/2/3 - טהרה (שלוחה 3)</option>
                    <option value="1/2/4">1/2/4 - ממונות (שלוחה 4)</option>
                    <option value="1/2/5">1/2/5 - נזיקין (שלוחה 5)</option>
                    <option value="1/2/6">1/2/6 - סמיכה (שלוחה 6)</option>
                    <option value="99999/2">99999/2 - כללי</option>
                </select>

                <label>סטטוס תור</label>
                <select id="ivrQueueStatus">
                    <option value="JOINEMPTY">JOINEMPTY - אין נציג פנוי</option>
                    <option value="CONTINUE">CONTINUE - נענה</option>
                    <option value="NO_ANSWER">NO_ANSWER - לא ענה</option>
                    <option value="BUSY">BUSY - תפוס</option>
                    <option value="CANCEL">CANCEL - בוטלה</option>
                </select>

                <div class="row">
                    <div>
                        <label>CustomerDID</label>
                        <input type="tel" id="ivrCustomerDID" value="0795792345" dir="ltr">
                    </div>
                    <div>
                        <label>RealDID</label>
                        <input type="tel" id="ivrRealDID" value="0795954570" dir="ltr">
                    </div>
                </div>

                <div class="row">
                    <div>
                        <label>זמן המתנה (שניות)</label>
                        <input type="number" id="ivrWaitSeconds" value="7">
                    </div>
                    <div>
                        <label>זמן שיחה (שניות)</label>
                        <input type="number" id="ivrTotalSeconds" value="7">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-send" id="btnSend">🚀 שלח וובהוק</button>
        </form>

        <div class="payload-toggle" onclick="togglePayloadPreview()">📋 הצג payload שיישלח</div>
        <div class="payload-preview" id="payloadPreview"></div>

        <div class="result" id="result"></div>
    </div>

    <script>
        let currentTarget = 'local';
        let currentType = 'elementor';

        const BASE_URLS = {
            local: 'http://localhost:8000',
            render: 'https://kinyan-crm-new-1.onrender.com'
        };

        function getEndpointUrl() {
            return BASE_URLS[currentTarget] + '/webhooks/lead';
        }

        function updateEndpointDisplay() {
            document.getElementById('endpointUrl').textContent = getEndpointUrl();
            const btn = document.getElementById('btnSend');
            if (currentType === 'ivr') {
                btn.className = 'btn-send ivr-mode';
                btn.innerHTML = '📞 שלח שיחת IVR';
            } else {
                btn.className = 'btn-send';
                btn.innerHTML = '🚀 שלח וובהוק';
            }
        }

        function setTarget(btn, target) {
            currentTarget = target;
            btn.parentElement.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateEndpointDisplay();
        }

        function setWebhookType(btn, type) {
            currentType = type;
            btn.parentElement.querySelectorAll('button').forEach(b => {
                b.classList.remove('active');
                b.classList.remove('active-ivr');
            });
            btn.classList.add(type === 'ivr' ? 'active-ivr' : 'active');

            document.getElementById('elementorFields').style.display = type === 'elementor' ? '' : 'none';
            document.getElementById('ivrFields').style.display = type === 'ivr' ? '' : 'none';
            updateEndpointDisplay();
            updatePayloadPreview();
        }

        function getNow() {
            const d = new Date();
            const months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
            const date = `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
            const dd = String(d.getDate()).padStart(2, '0');
            const mm = String(d.getMonth() + 1).padStart(2, '0');
            const yyyy = d.getFullYear();
            const dateShort = `${dd}/${mm}/${yyyy}`;
            const hh = String(d.getHours()).padStart(2, '0');
            const mi = String(d.getMinutes()).padStart(2, '0');
            const ss = String(d.getSeconds()).padStart(2, '0');
            const timeShort = `${hh}:${mi}:${ss}`;
            const h = d.getHours() % 12 || 12;
            const m = String(d.getMinutes()).padStart(2, '0');
            const ampm = d.getHours() >= 12 ? 'pm' : 'am';
            return { date, dateShort, timeShort, time: `${h}:${m} ${ampm}` };
        }

        function buildElementorPayload() {
            const name = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const course = document.getElementById('course').value;
            const message = document.getElementById('message').value.trim();
            const now = getNow();

            return {
                "form[id]": "b61ca57",
                "form[name]": "New Form",
                "fields[name][id]": "name",
                "fields[name][type]": "text",
                "fields[name][title]": "Name",
                "fields[name][value]": name,
                "fields[name][raw_value]": name,
                "fields[name][required]": "1",
                "fields[email][id]": "email",
                "fields[email][type]": "email",
                "fields[email][title]": "Email",
                "fields[email][value]": email,
                "fields[email][raw_value]": email,
                "fields[email][required]": "1",
                "fields[field_6f8642e][id]": "field_6f8642e",
                "fields[field_6f8642e][type]": "tel",
                "fields[field_6f8642e][title]": "טלפון",
                "fields[field_6f8642e][value]": phone,
                "fields[field_6f8642e][raw_value]": phone,
                "fields[field_6f8642e][required]": "1",
                "fields[field_fb4ae08][id]": "field_fb4ae08",
                "fields[field_fb4ae08][type]": "select",
                "fields[field_fb4ae08][title]": "בחר מסלול",
                "fields[field_fb4ae08][value]": course,
                "fields[field_fb4ae08][raw_value]": course,
                "fields[field_fb4ae08][required]": "1",
                "fields[field_b1e584d][id]": "field_b1e584d",
                "fields[field_b1e584d][type]": "textarea",
                "fields[field_b1e584d][title]": "תוכן ההודעה",
                "fields[field_b1e584d][value]": message,
                "fields[field_b1e584d][raw_value]": message,
                "fields[field_b1e584d][required]": "0",
                "fields[field_32565c1][id]": "field_32565c1",
                "fields[field_32565c1][type]": "acceptance",
                "fields[field_32565c1][title]": "מאשר תוכן",
                "fields[field_32565c1][value]": "on",
                "fields[field_32565c1][raw_value]": "on",
                "fields[field_32565c1][required]": "1",
                "fields[utm_source][id]": "utm_source",
                "fields[utm_source][type]": "hidden",
                "fields[utm_source][title]": "מקור",
                "fields[utm_source][value]": "",
                "fields[utm_source][raw_value]": "",
                "fields[utm_source][required]": "0",
                "fields[field_aab9d21][id]": "field_aab9d21",
                "fields[field_aab9d21][type]": "hidden",
                "fields[field_aab9d21][title]": "UTM",
                "fields[field_aab9d21][value]": "",
                "fields[field_aab9d21][raw_value]": "",
                "fields[field_aab9d21][required]": "0",
                "fields[field_4c63868][id]": "field_4c63868",
                "fields[field_4c63868][type]": "hidden",
                "fields[field_4c63868][title]": "מוצר משווק",
                "fields[field_4c63868][value]": "",
                "fields[field_4c63868][raw_value]": "",
                "fields[field_4c63868][required]": "0",
                "meta[date][title]": "תאריך",
                "meta[date][value]": now.date,
                "meta[time][title]": "זמן",
                "meta[time][value]": now.time,
                "meta[page_url][title]": "קישור לעמוד",
                "meta[page_url][value]": "https://www.kinyanhoraah.co.il/",
                "meta[user_agent][title]": "פרטי משתמש",
                "meta[user_agent][value]": navigator.userAgent,
                "meta[remote_ip][title]": "IP השולח",
                "meta[remote_ip][value]": "127.0.0.1",
                "meta[credit][title]": "מופעל באמצעות",
                "meta[credit][value]": "אלמנטור"
            };
        }

        function buildIvrPayload() {
            const phone = document.getElementById('ivrPhone').value.trim();
            const folder = document.getElementById('ivrFolder').value;
            const queueStatus = document.getElementById('ivrQueueStatus').value;
            const customerDID = document.getElementById('ivrCustomerDID').value.trim();
            const realDID = document.getElementById('ivrRealDID').value.trim();
            const waitSeconds = document.getElementById('ivrWaitSeconds').value;
            const totalSeconds = document.getElementById('ivrTotalSeconds').value;
            const now = getNow();

            function secsToTime(s) {
                const sec = parseInt(s) || 0;
                const m = Math.floor(sec / 60);
                const r = sec % 60;
                return `0:${m}:${r}`;
            }

            return {
                "CustomerDID": customerDID,
                "RealDID": realDID,
                "Folder": folder,
                "Phone": phone,
                "Date": now.dateShort,
                "Time": now.timeShort,
                "HebrewDate": "",
                "Module": "queue",
                "QueueStatus": queueStatus,
                "QueueTotalSeconds": totalSeconds,
                "QueueTotalTime": secsToTime(totalSeconds),
                "QueueWaitingSeconds": waitSeconds,
                "QueueWaitingTime": secsToTime(waitSeconds),
                "YemotCallID": crypto.randomUUID(),
                "YDTimestamp": String(Date.now())
            };
        }

        function buildPayload() {
            return currentType === 'ivr' ? buildIvrPayload() : buildElementorPayload();
        }

        function togglePayloadPreview() {
            const el = document.getElementById('payloadPreview');
            if (el.style.display === 'block') {
                el.style.display = 'none';
            } else {
                updatePayloadPreview();
                el.style.display = 'block';
            }
        }

        function updatePayloadPreview() {
            const el = document.getElementById('payloadPreview');
            if (el.style.display === 'block') {
                el.textContent = JSON.stringify(buildPayload(), null, 2);
            }
        }

        // Update preview on input change
        document.addEventListener('input', updatePayloadPreview);
        document.addEventListener('change', updatePayloadPreview);

        async function sendWebhook(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSend');
            const resultDiv = document.getElementById('result');
            
            btn.disabled = true;
            btn.innerHTML = 'שולח... <span class="spinner"></span>';
            resultDiv.className = 'result';
            resultDiv.style.display = 'none';

            try {
                const payload = buildPayload();
                const url = getEndpointUrl();

                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                
                if (res.ok && data.success !== false) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = '✅ ' + res.status + ' OK\n' + JSON.stringify(data, null, 2);
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = '❌ ' + res.status + '\n' + JSON.stringify(data, null, 2);
                }
            } catch (err) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ Network Error\n' + err.message;
            } finally {
                btn.disabled = false;
                updateEndpointDisplay();
            }
        }
    </script>
</body>
</html>
