<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בדיקת וובהוק - Kinyan CRM</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            border: 1px solid #334155;
        }
        h1 {
            font-size: 22px;
            margin-bottom: 6px;
            color: #38bdf8;
        }
        .subtitle {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 24px;
        }
        .endpoint-badge {
            display: inline-block;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 6px;
            padding: 6px 12px;
            font-family: monospace;
            font-size: 12px;
            color: #38bdf8;
            margin-bottom: 20px;
            direction: ltr;
            text-align: left;
            width: 100%;
        }
        .endpoint-badge span { color: #22c55e; }
        label {
            display: block;
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 6px;
            font-weight: 500;
        }
        label .optional {
            font-size: 11px;
            color: #64748b;
            font-weight: normal;
        }
        input, select {
            width: 100%;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 15px;
            font-family: inherit;
            margin-bottom: 16px;
            transition: border-color 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }
        input::placeholder { color: #64748b; }
        .row {
            display: flex;
            gap: 12px;
        }
        .row > div { flex: 1; }
        .target-group {
            margin-bottom: 20px;
        }
        .target-group label {
            margin-bottom: 8px;
        }
        .target-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .target-options button {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #94a3b8;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }
        .target-options button:hover {
            border-color: #38bdf8;
            color: #38bdf8;
        }
        .target-options button.active {
            background: #38bdf8;
            color: #0f172a;
            border-color: #38bdf8;
            font-weight: 600;
        }
        .btn-send {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: #0f172a;
            font-size: 16px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        .btn-send:hover { opacity: 0.9; }
        .btn-send:active { transform: scale(0.98); }
        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .result {
            margin-top: 16px;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            direction: ltr;
            text-align: left;
            white-space: pre-wrap;
            word-break: break-all;
            display: none;
            font-family: monospace;
            max-height: 200px;
            overflow-y: auto;
        }
        .result.success {
            background: #052e16;
            border: 1px solid #22c55e;
            color: #86efac;
            display: block;
        }
        .result.error {
            background: #450a0a;
            border: 1px solid #ef4444;
            color: #fca5a5;
            display: block;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #0f172a;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-left: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔗 בדיקת וובהוק</h1>
        <p class="subtitle">שליחת וובהוק Elementor לבדיקה למערכת Kinyan CRM</p>

        <div class="target-group">
            <label>יעד</label>
            <div class="target-options">
                <button type="button" class="active" onclick="setTarget(this, 'local')">מקומי (8000)</button>
                <button type="button" onclick="setTarget(this, 'render')">Render (Production)</button>
            </div>
        </div>

        <div class="endpoint-badge">
            <span>POST</span> <span id="endpointUrl">http://localhost:8000/webhooks/elementor</span>
        </div>

        <form id="webhookForm" onsubmit="sendWebhook(event)">
            <label>שם מלא *</label>
            <input type="text" id="fullName" placeholder="הדסה קליין" required>

            <div class="row">
                <div>
                    <label>טלפון *</label>
                    <input type="tel" id="phone" placeholder="0527180979" required dir="ltr">
                </div>
                <div>
                    <label>אימייל <span class="optional">(לא חובה)</span></label>
                    <input type="email" id="email" placeholder="user@email.com" dir="ltr">
                </div>
            </div>

            <label>מסלול</label>
            <select id="course">
                <option value="כח הטענה">כח הטענה</option>
                <option value="שבת">שבת</option>
                <option value="איסור והיתר">איסור והיתר</option>
                <option value="טהרה">טהרה</option>
                <option value="חושן משפט">חושן משפט</option>
            </select>

            <button type="submit" class="btn-send" id="btnSend">🚀 שלח וובהוק</button>
        </form>

        <div class="result" id="result"></div>
    </div>

    <script>
        let currentTarget = 'local';
        const TARGETS = {
            local: 'http://localhost:8000/webhooks/elementor',
            render: 'https://kinyan-crm-new-1.onrender.com/webhooks/elementor'
        };

        function setTarget(btn, target) {
            currentTarget = target;
            document.querySelectorAll('.target-options button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('endpointUrl').textContent = TARGETS[target];
        }

        function getNow() {
            const d = new Date();
            const months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
            const date = `${months[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
            const h = d.getHours() % 12 || 12;
            const m = String(d.getMinutes()).padStart(2, '0');
            const ampm = d.getHours() >= 12 ? 'pm' : 'am';
            return { date, time: `${h}:${m} ${ampm}` };
        }

        function buildPayload() {
            const name = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const course = document.getElementById('course').value;
            const now = getNow();

            return {
                "form[id]": "b61ca57",
                "form[name]": "New Form",
                "fields[name][id]": "name",
                "fields[name][type]": "text",
                "fields[name][title]": "Name",
                "fields[name][value]": name,
                "fields[name][raw_value]": name,
                "fields[name][required]": "1",
                "fields[email][id]": "email",
                "fields[email][type]": "email",
                "fields[email][title]": "Email",
                "fields[email][value]": email,
                "fields[email][raw_value]": email,
                "fields[email][required]": "1",
                "fields[field_6f8642e][id]": "field_6f8642e",
                "fields[field_6f8642e][type]": "tel",
                "fields[field_6f8642e][title]": "טלפון",
                "fields[field_6f8642e][value]": phone,
                "fields[field_6f8642e][raw_value]": phone,
                "fields[field_6f8642e][required]": "1",
                "fields[field_fb4ae08][id]": "field_fb4ae08",
                "fields[field_fb4ae08][type]": "select",
                "fields[field_fb4ae08][title]": "בחר מסלול",
                "fields[field_fb4ae08][value]": course,
                "fields[field_fb4ae08][raw_value]": course,
                "fields[field_fb4ae08][required]": "1",
                "fields[field_b1e584d][id]": "field_b1e584d",
                "fields[field_b1e584d][type]": "textarea",
                "fields[field_b1e584d][title]": "תוכן ההודעה",
                "fields[field_b1e584d][value]": "",
                "fields[field_b1e584d][raw_value]": "",
                "fields[field_b1e584d][required]": "0",
                "fields[field_32565c1][id]": "field_32565c1",
                "fields[field_32565c1][type]": "acceptance",
                "fields[field_32565c1][title]": "מאשר תוכן",
                "fields[field_32565c1][value]": "on",
                "fields[field_32565c1][raw_value]": "on",
                "fields[field_32565c1][required]": "1",
                "fields[utm_source][id]": "utm_source",
                "fields[utm_source][type]": "hidden",
                "fields[utm_source][title]": "מקור",
                "fields[utm_source][value]": "",
                "fields[utm_source][raw_value]": "",
                "fields[utm_source][required]": "0",
                "fields[field_aab9d21][id]": "field_aab9d21",
                "fields[field_aab9d21][type]": "hidden",
                "fields[field_aab9d21][title]": "UTM",
                "fields[field_aab9d21][value]": "",
                "fields[field_aab9d21][raw_value]": "",
                "fields[field_aab9d21][required]": "0",
                "fields[field_4c63868][id]": "field_4c63868",
                "fields[field_4c63868][type]": "hidden",
                "fields[field_4c63868][title]": "מוצר משווק",
                "fields[field_4c63868][value]": "",
                "fields[field_4c63868][raw_value]": "",
                "fields[field_4c63868][required]": "0",
                "meta[date][title]": "תאריך",
                "meta[date][value]": now.date,
                "meta[time][title]": "זמן",
                "meta[time][value]": now.time,
                "meta[page_url][title]": "קישור לעמוד",
                "meta[page_url][value]": "https://www.kinyanhoraah.co.il/",
                "meta[user_agent][title]": "פרטי משתמש",
                "meta[user_agent][value]": navigator.userAgent,
                "meta[remote_ip][title]": "IP השולח",
                "meta[remote_ip][value]": "127.0.0.1",
                "meta[credit][title]": "מופעל באמצעות",
                "meta[credit][value]": "אלמנטור"
            };
        }

        async function sendWebhook(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSend');
            const resultDiv = document.getElementById('result');
            
            btn.disabled = true;
            btn.innerHTML = 'שולח... <span class="spinner"></span>';
            resultDiv.className = 'result';
            resultDiv.style.display = 'none';

            try {
                const payload = buildPayload();
                const url = TARGETS[currentTarget];

                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                
                if (res.ok && data.success !== false) {
                    resultDiv.className = 'result success';
                    resultDiv.textContent = '✅ ' + res.status + ' OK\n' + JSON.stringify(data, null, 2);
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.textContent = '❌ ' + res.status + '\n' + JSON.stringify(data, null, 2);
                }
            } catch (err) {
                resultDiv.className = 'result error';
                resultDiv.textContent = '❌ Network Error\n' + err.message;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 שלח וובהוק';
            }
        }
    </script>
</body>
</html>
