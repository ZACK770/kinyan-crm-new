# Kinyan CRM - Render Blueprint
# ================================
# This file auto-configures all services for deployment on Render.
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy: Connect your GitHub repo → Render will detect this file → One-click deploy
#
# Note: The app automatically converts Render's postgres:// URLs to postgresql+asyncpg://
#       for async SQLAlchemy compatibility. No manual conversion needed.

# ============================================================
# DATABASE
# ============================================================
databases:
  - name: kinyan-crm-db
    databaseName: kinyan_crm
    user: crm_user
    plan: starter  # Change to 'standard' for production
    region: frankfurt
    postgresMajorVersion: "16"

# ============================================================
# SERVICES
# ============================================================
services:
  # ------------------------------------------------------------
  # Backend API (FastAPI + Uvicorn)
  # ------------------------------------------------------------
  - type: web
    name: kinyan-crm-api
    runtime: python
    region: frankfurt
    plan: starter  # Change to 'standard' for production
    
    # Build & Start
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    
    # Health check
    healthCheckPath: /health
    
    # Environment variables
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      
      # Database - automatically linked to our postgres instance
      - key: DATABASE_URL
        fromDatabase:
          name: kinyan-crm-db
          property: connectionString
        # Note: Render provides postgresql://, we need postgresql+asyncpg://
        # Use the transform below in code or add a build script
      
      # Secrets - auto-generated
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: API_KEY
        generateValue: true
      
      # JWT Configuration
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION_MINUTES
        value: "1440"
      
      # Frontend URL - linked to our static site
      - key: FRONTEND_URL
        fromService:
          type: web
          name: kinyan-crm-frontend
          property: host
      
      # Google OAuth (set these in Render Dashboard for security)
      - key: GOOGLE_CLIENT_ID
        sync: false  # Must be set manually in dashboard
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      
      # SMTP Email (set in Render Dashboard)
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: "Kinyan CRM"

  # ------------------------------------------------------------
  # Frontend (React + Vite Static Site)
  # ------------------------------------------------------------
  - type: web
    name: kinyan-crm-frontend
    runtime: static
    region: frankfurt
    plan: starter
    
    # Build configuration
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    
    # SPA routing - all paths serve index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    
    # Headers for security
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    
    # Environment variables for build
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_URL
        fromService:
          type: web
          name: kinyan-crm-api
          property: host

# ============================================================
# ENVIRONMENT GROUPS (optional - for shared secrets)
# ============================================================
envVarGroups:
  - name: kinyan-shared-secrets
    envVars:
      - key: ORIGAMI_URL
        sync: false
      - key: ORIGAMI_USERNAME
        sync: false
      - key: ORIGAMI_SECRET
        sync: false
