# Kinyan CRM - Render Blueprint
# ================================
# SINGLE SERVER deployment - API + Frontend served together!
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy: Connect your GitHub repo → Render will detect this file → One-click deploy

# ============================================================
# DATABASE
# ============================================================
databases:
  - name: kinyan-crm-db
    databaseName: kinyan_crm
    user: crm_user
    plan: starter  # Change to 'standard' for production
    region: frankfurt
    postgresMajorVersion: "16"

# ============================================================
# SINGLE WEB SERVICE (API + Frontend)
# ============================================================
services:
  - type: web
    name: kinyan-crm
    runtime: python
    region: frankfurt
    plan: starter  # Change to 'standard' for production
    branch: fitchers  # Deploy from fitchers branch
    
    # Build: Install Python deps, build frontend, run migrations
    buildCommand: pip install -r requirements.txt && rm -rf frontend/dist && cd frontend && npm install && npm run build && cd .. && alembic upgrade head
    
    # Start: uvicorn serves API + static frontend
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    
    # Health check
    healthCheckPath: /health
    
    # Environment variables
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: NODE_VERSION
        value: "20"
      
      # Database - automatically linked
      - key: DATABASE_URL
        fromDatabase:
          name: kinyan-crm-db
          property: connectionString
      
      # Secrets - auto-generated
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: API_KEY
        generateValue: true
      
      # JWT Configuration
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION_MINUTES
        value: "1440"
      
      # Google OAuth (set these in Render Dashboard for security)
      - key: GOOGLE_CLIENT_ID
        sync: false  # Must be set manually in dashboard
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      
      # SMTP Email (set in Render Dashboard)
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        value: "Kinyan CRM"
